# config.example.ini
# Copy this file to config.ini and adjust the values to your environment.
# config.ini is ignored by git to keep private settings out of version control.

OPENCLAW_USER="hackerman"                 # your main OpenClaw user name
# OPENCLAW_HOME uses OPENCLAW_USER above – keep this line after OPENCLAW_USER
OPENCLAW_HOME="/home/${OPENCLAW_USER}/.openclaw"
LOGFILE="/var/log/clean-it.log"
DRY_RUN=false                             # set to true for testing only (no destructive actions)
DAYS_SESSION=30                           # delete old session files after X days
DAYS_LOG=14                               # delete old log files after X days
DAYS_TMP=7                                # delete temp files after X days
